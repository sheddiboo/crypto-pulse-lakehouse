version: 2

models:
  - name: stg_crypto_prices
    description: "Silver layer view that deduplicates and standardizes raw crypto data."
    columns:
      - name: coin_id
        description: "The unique identifier for the cryptocurrency."
        tests:
          - not_null

      - name: price
        description: "The current price of the asset in USD."
        tests:
          - not_null

      - name: observed_at
        description: "The timestamp of the price observation."
        tests:
          - not_null

  - name: fct_crypto_market_pulse
    description: "Gold layer table containing rolling 24h moving averages and price changes."
    columns:
      - name: coin_id
        description: "The unique identifier for the cryptocurrency."
        tests:
          - not_null

      - name: moving_avg_24h
        description: "The rolling 24-hour moving average of the asset's price."
        tests:
          - not_null

      - name: pct_change_24h
        description: "Percentage deviation from the 24h moving average."
        # We don't strictly test not_null here because the first 24 hours of a new coin might not have a moving average yet!